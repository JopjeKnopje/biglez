version: v1alpha1 # Indicates the schema used to decode the contents.
debug: false # Enable verbose logging to the console.
persist: true
# Provides machine specific configuration options.
machine:
  type: controlplane # Defines the role of the machine within the cluster.
  install:
    disk: /dev/sdb # The disk used for installations.
    image: ghcr.io/siderolabs/installer:v1.12.6 # Allows for supplying the image used to perform the installation.
cluster:
  controlPlane:
    endpoint: https://192.168.1.14:6443/ # Endpoint is the canonical controlplane endpoint, which can be an IP address or a DNS hostname.
  clusterName: biglez # Configures the cluster's name.
  # Allows running workload on control-plane nodes.
  allowSchedulingOnControlPlanes: true
