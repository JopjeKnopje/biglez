apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
  - target:
      annotationSelector: "helm.sh/hook"
    patch: |-
      - op: remove
        path: /metadata/annotations/helm.sh~1hook
  - target:
      annotationSelector: "helm.sh/hook-weight"
    patch: |-
      - op: remove
        path: /metadata/annotations/helm.sh~1hook-weight
