bitwarden-sdk-server:
  enabled: true
webhook:
  create: true
  lookaheadInterval: 48h
  certManager:
    enabled: true
    addInjectorAnnotations: true
    cert:
      create: true
      issuerRef:
        group: cert-manager.io
        kind: Issuer
        name: eso-webhook-ca-issuer
      duration: "168h"
      renewBefore: "72h"
