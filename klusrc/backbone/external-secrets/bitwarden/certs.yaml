apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: bitwarden-bootstrap-ca
spec:
  isCA: true
  commonName: bitwarden-sdk-root-ca
  secretName: bitwarden-root-ca
  subject:
    organizations:
      - external-secrets.io
  privateKey:
    algorithm: RSA
    encoding: PKCS8
    size: 2048
  issuerRef:
    name: bitwarden-bootstrap-issuer
    kind: Issuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: bitwarden-sdk-server-tls
spec:
  secretName: bitwarden-tls-certs
  dnsNames:
    - bitwarden-sdk-server.external-secrets.svc.cluster.local
    - bitwarden-sdk-server.external-secrets.svc
    - bitwarden-sdk-server
    - localhost
  ipAddresses:
    - 127.0.0.1
    - ::1
  privateKey:
    algorithm: RSA
    encoding: PKCS8
    size: 2048
  issuerRef:
    name: bitwarden-ca-issuer
    kind: Issuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: eso-webhook-bootstrap-ca
  namespace: external-secrets
spec:
  isCA: true
  commonName: eso-webhook-root-ca
  secretName: eso-webhook-root-ca
  subject:
    organizations:
      - external-secrets.io
  privateKey:
    algorithm: RSA
    encoding: PKCS8
    size: 2048
  issuerRef:
    name: eso-webhook-bootstrap-issuer
    kind: Issuer
    group: cert-manager.io
