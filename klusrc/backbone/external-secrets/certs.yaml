apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: eso-webhook-bootstrap-ca
  namespace: external-secrets
spec:
  isCA: true
  commonName: eso-webhook-root-ca
  secretName: eso-webhook-root-ca
  subject:
    organizations:
      - external-secrets.io
  privateKey:
    algorithm: RSA
    encoding: PKCS8
    size: 2048
  issuerRef:
    name: eso-webhook-bootstrap-issuer
    kind: Issuer
    group: cert-manager.io

