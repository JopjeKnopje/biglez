apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: restic-config
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secretsmanager
  target:
    name: restic-config
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: restic-hetzner
